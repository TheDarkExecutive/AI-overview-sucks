<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>No AI Overview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #1e2227;
      font-family: 'Times New Roman', Times, serif;
      color: #ffffff;
    }

    .header {
      background: #16191d;
      border-bottom: 1px solid #111416;
      padding: 20px 22px 17px;
    }

    .header-title {
      font-size: 17px;
      color: #00e5a0;
      font-weight: normal;
    }

    .header-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 5px;
      font-style: italic;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid #111416;
    }

    .row-label {
      font-size: 14px;
      color: #ffffff;
    }

    /* Toggle */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #2a2f38;
      border: 1px solid #2e3540;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #484f5a;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #002a1a;
      border-color: #00e5a0;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #00e5a0;
    }

    /* Status */
    .status-band {
      padding: 13px 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      font-style: italic;
      background: #191d22;
      border-bottom: 1px solid #111416;
    }

    .status-band .val { color: #00e5a0; font-style: normal; }
    .status-band.off .val { color: rgba(255,255,255,0.2); }

    .cursor {
      display: inline-block;
      width: 5px;
      height: 11px;
      background: #00e5a0;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    .status-band.off .cursor { background: rgba(255,255,255,0.15); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Footer */
    .footer {
      padding: 12px 22px;
      background: #16191d;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      font-style: italic;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">No AI Overview</div>
    <div class="header-sub">Google Search Filter</div>
  </div>

  <div class="row">
    <div class="row-label">Block AI Overview</div>
    <label class="switch">
      <input type="checkbox" id="mainToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status-band" id="statusBand">
    Status: <span class="val" id="valText">filtering active</span><span class="cursor"></span>
  </div>

  <div class="footer">built with purpose</div>

  <script src="popup.js"></script>
</body>
</html>
